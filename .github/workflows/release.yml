name: Release

on:
  workflow_dispatch:

jobs:
  publish-latest:
    name: Publish latest (npm)
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: write  # changeset needs to push git tags
      id-token: write  # OIDC trusted publishing
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # changeset needs full git history

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'  # Minimum: 22.14.0 for OIDC trusted publishing
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm i

      - name: Build
        run: pnpm run build --if-present

      - name: Publish to npm
        run: pnpm changeset publish --tag latest
